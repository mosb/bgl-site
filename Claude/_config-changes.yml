# ═════════════════════════════════════════════════════════════════════════
# Bayesian Governance Lab — keys to MERGE into al-folio's _config.yml.
# Edit each key in your fork's existing _config.yml. Do NOT paste this file
# in wholesale: the upstream _config.yml carries plugin and collection
# plumbing you must keep. Line numbers refer to a fresh al-folio v1 fork.
# ═════════════════════════════════════════════════════════════════════════

# ── Identity (top of file) ───────────────────────────────────────────────
title: Bayesian Governance Lab     # ~line 5; navbar brand + tab title
first_name:                        # ~line 6; blank the person-name fields
middle_name:
last_name:                         # ~line 8
description: >                     # ~line 11
  Bayesian Governance Lab, University of Oxford. Probabilistic machine
  learning for the assurance, monitoring, and governance of AI systems.
keywords: bayesian machine learning, ai governance, uncertainty, oxford  # ~line 17
icon: ⚖️                            # emoji favicon (kills the favicon 404s); optional

# ── Served location ──────────────────────────────────────────────────────
url: https://www.robots.ox.ac.uk
baseurl: /~bgl                     # no trailing slash; asset links break if wrong

# ── Turn off demo/blog features ──────────────────────────────────────────
blog_name:                         # ~line 125; blank (no blog)
blog_description:
disqus_shortname:                  # ~line 155; blank to disable Disqus
external_sources:                  # ~line 162; empty the list (stops Medium/Google fetches)
# giscus: leave the block but it stays inert unless you set a repo (~line 140)

# ── jekyll-scholar (publications) ────────────────────────────────────────
# Keep al-folio's scholar block; change only the author-highlight names.
scholar:
  last_name: [Osborne]
  first_name: [Maike, M., Michael, Michael A.]   # bold the lab's author across variants
# group_by: year and group_order: descending are already set upstream — keep them.

# ── Feature toggles (in the "Optional Features" block, ~line 460+) ────────
enable_math: true                  # probabilistic ML needs MathJax
enable_darkmode: true
enable_project_categories: false   # you're not using the projects collection
enable_masonry: false              # ditto
enable_navbar_social: false        # set true if you want social icons in the navbar

# ── File watcher: stop the "already being watched" errors ────────────────
# Add these agent dirs to the existing `exclude:` list in _config.yml:
exclude:
  - .agents
  - .claude
  - .codex
# (append to, don't replace, the upstream exclude list)

# ── Footer / contact ─────────────────────────────────────────────────────
# In footer_text (top of _config.yml) and _data/socials.yml, point at:
#   Bayesian Governance Lab
#   Department of Engineering Science, University of Oxford, Parks Road, Oxford OX1 3PJ
#   Oxford Martin AI Governance Initiative: https://www.oxfordmartin.ox.ac.uk/ai-governance
